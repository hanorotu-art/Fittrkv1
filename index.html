<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="theme-color" content="#0b1020"><title>Iron Quest</title><link rel="stylesheet" href="style.css"></head><body><header class="hero"><div><p class="eyebrow">BAD DECISIONS FITNESS</p><h1>IRON QUEST</h1><p>Train. Level up. Become suspiciously powerful.</p></div><div class="level"><small>LVL</small><strong id="level">1</strong></div></header><main><section class="card stats"><div><span>XP</span><strong id="xpText">0 / 500</strong></div><div><span>Streak</span><strong id="streak">0 days</strong></div><div><span>Sessions</span><strong id="sessions">0</strong></div><div class="bar"><i id="xpBar"></i></div></section><section class="card"><p class="eyebrow">TODAY'S MISSION</p><h2 id="missionTitle"></h2><p id="missionSummary"></p><div id="phaseList"></div><button id="startBtn" class="primary">Start Mission</button></section><section id="player" class="card hidden"><p id="phaseName" class="eyebrow"></p><div class="player-head"><div><h2 id="moveName"></h2><p id="moveNote"></p></div><div id="timer" class="timer">00:30</div></div><div class="bar"><i id="sessionBar"></i></div><div class="controls"><button id="back">Back</button><button id="pause" class="primary">Pause</button><button id="next">Next</button></div><div class="controls mini"><button id="minus">−5 sec</button><button id="restart">Restart</button><button id="plus">+5 sec</button></div></section><section class="grid"><article class="card"><p class="eyebrow">QUEST LOG</p><div id="questLog"></div></article><article class="card"><p class="eyebrow">ACHIEVEMENTS</p><div id="achievements"></div></article></section><section class="card"><p class="eyebrow">WEEKLY CAMPAIGN</p><div id="week"></div><button id="reset" class="danger">Reset test progress</button></section></main><div id="toast" class="toast hidden"></div><script src="app.js"></script></body></html>
