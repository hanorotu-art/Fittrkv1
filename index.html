<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#111827" />
  <title>Iron Notes</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="app-header">
    <div>
      <h1>Iron Notes</h1>
      <p>Your workouts. No nonsense.</p>
    </div>
    <button id="installBtn" class="secondary hidden">Install App</button>
  </header>

  <main>
    <nav class="tabs">
      <button class="tab active" data-tab="workout">Workout</button>
      <button class="tab" data-tab="history">History</button>
      <button class="tab" data-tab="progress">Progress</button>
      <button class="tab" data-tab="settings">Settings</button>
    </nav>

    <section id="workout" class="panel active">
      <div class="card">
        <label for="routineSelect">Choose routine</label>
        <div class="row">
          <select id="routineSelect"></select>
          <button id="loadRoutineBtn">Load</button>
        </div>
      </div>

      <div class="card">
        <div class="row space-between">
          <div>
            <h2 id="workoutTitle">Today’s Workout</h2>
            <p id="workoutDate"></p>
          </div>
          <button id="addExerciseBtn" class="secondary">+ Exercise</button>
        </div>
        <div id="exerciseList"></div>
        <button id="finishWorkoutBtn" class="finish">Finish Workout</button>
      </div>
    </section>

    <section id="history" class="panel">
      <div class="card">
        <h2>Workout History</h2>
        <div id="historyList"></div>
      </div>
    </section>

    <section id="progress" class="panel">
      <div class="card">
        <h2>Progress</h2>
        <label for="progressExercise">Exercise</label>
        <select id="progressExercise"></select>
        <div id="progressSummary" class="summary-grid"></div>
        <canvas id="progressChart" width="700" height="320"></canvas>
      </div>
    </section>

    <section id="settings" class="panel">
      <div class="card">
        <h2>Routines</h2>
        <div id="routineEditor"></div>
        <button id="newRoutineBtn">+ New Routine</button>
      </div>

      <div class="card">
        <h2>Data</h2>
        <button id="exportBtn" class="secondary">Export Backup</button>
        <label class="file-label secondary">
          Import Backup
          <input id="importInput" type="file" accept=".json" />
        </label>
        <button id="resetBtn" class="danger">Reset All Data</button>
      </div>
    </section>
  </main>

  <dialog id="exerciseDialog">
    <form method="dialog" id="exerciseForm">
      <h3>Add Exercise</h3>
      <label>Name<input id="exerciseName" required /></label>
      <label>Sets<input id="exerciseSets" type="number" min="1" max="10" value="3" required /></label>
      <div class="dialog-actions">
        <button value="cancel" class="secondary">Cancel</button>
        <button value="default">Add</button>
      </div>
    </form>
  </dialog>

  <dialog id="routineDialog">
    <form method="dialog" id="routineForm">
      <h3>New Routine</h3>
      <label>Routine name<input id="routineName" required /></label>
      <label>Exercises, one per line<textarea id="routineExercises" rows="8" placeholder="Neutral Pull Up&#10;Lat Pulldown&#10;Cable Crunch"></textarea></label>
      <div class="dialog-actions">
        <button value="cancel" class="secondary">Cancel</button>
        <button value="default">Save</button>
      </div>
    </form>
  </dialog>

  <script src="app.js"></script>
</body>
</html>
